spring.application.name=apiGetaway
server.port=8090

# authService
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8091
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

# academicService
spring.cloud.gateway.server.webflux.routes[1].id=academic-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8092
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/students/**,/courses/**,/teachers/**,/subjects/**,/enrollments/**,/evaluations/**,/grades/**,/guardians/**

# attendanceService (cuando esté implementado)
spring.cloud.gateway.server.webflux.routes[2].id=attendance-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8093
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/sessions/**,/attendances/**,/annotations/**

# CORS — localhost en cualquier puerto (8094, 5173, etc.)
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOriginPatterns=http://localhost:*,http://127.0.0.1:*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowCredentials=true
